name: openastroara
description: "OpenAstro Ara client — runs on WILMA: Windows, iOS, Linux, macOS, and Android (Phase 11 scaffold)."
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ^3.12.0
  flutter: '>=3.44.0 <3.45.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  dio: ^5.10.0
  web_socket_channel: ^3.0.3
  multicast_dns: ^0.3.3
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.2
  flutter_secure_storage: ^10.3.0
  file_picker: ^12.0.0-beta.7
  fl_chart: ^1.1.1
  collection: ^1.19.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.6
  # §44 backup stream — sha-256 verification of pulled frames.
  crypto: ^3.0.6
  # §35.5 audible safety alarm — loops the bundled tone on safety.unsafe /
  # safety.emergency_stop until silenced.
  audioplayers: ^6.1.0
  package_info_plus: ^10.2.0
  # §36 Planetarium renderer: the platform's native webview embedded as a platform
  # view — WKWebView (macOS/iOS), WebView2 (Windows), WebKitGTK (Linux), System
  # WebView (Android). Replaced the CEF OSR path, which stalled under sustained GPU
  # offscreen render on macOS and broke Flutter's GL context on Linux. See
  # lib/widgets/sky_atlas/stellarium_view.dart and design/PORT_DECISIONS.md.
  webview_all: ^1.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Deterministic timer control for the §64 Live View poll-loop tests.
  fake_async: ^1.3.1

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    # §35.5 bundled alarm tones (generated sine-synth loops, no third-party
    # audio licensing to carry).
    - assets/audio/
    # §36 Planetarium — the Stellarium Web Engine (AGPL, built from pristine
    # source: github.com/Stellarium/stellarium-web-engine; see
    # assets/stellarium/LICENSE-AGPL-3.0.txt) plus the offline sky data served to
    # the CEF webview by StellariumServer. Flutter doesn't recurse into asset
    # directories, so each leaf dir is listed; regenerate with
    #   (cd assets/stellarium && find . -type d | sort)
    - assets/stellarium/
    - assets/stellarium/skydata/
    - assets/stellarium/skydata/dso/
    - assets/stellarium/skydata/dso/Norder0/
    - assets/stellarium/skydata/dso/Norder0/Dir0/
    - assets/stellarium/skydata/landscapes/
    - assets/stellarium/skydata/landscapes/horizon/
    - assets/stellarium/skydata/landscapes/horizon/Norder0/
    - assets/stellarium/skydata/landscapes/horizon/Norder0/Dir0/
    - assets/stellarium/skydata/skycultures/
    - assets/stellarium/skydata/skycultures/western/
    - assets/stellarium/skydata/skycultures/western/illustrations/
    - assets/stellarium/skydata/stars/
    - assets/stellarium/skydata/stars/Norder0/
    - assets/stellarium/skydata/stars/Norder0/Dir0/
    - assets/stellarium/skydata/stars/Norder1/
    - assets/stellarium/skydata/stars/Norder1/Dir0/
    - assets/stellarium/skydata/surveys/
    - assets/stellarium/skydata/surveys/milkyway/
    - assets/stellarium/skydata/surveys/milkyway/Norder0/
    - assets/stellarium/skydata/surveys/milkyway/Norder0/Dir0/
    - assets/stellarium/skydata/surveys/sso/
    - assets/stellarium/skydata/surveys/sso/moon/
    - assets/stellarium/skydata/surveys/sso/moon/Norder0/
    - assets/stellarium/skydata/surveys/sso/moon/Norder0/Dir0/
    - assets/stellarium/skydata/surveys/sso/sun/
    - assets/stellarium/skydata/surveys/sso/sun/Norder0/
    - assets/stellarium/skydata/surveys/sso/sun/Norder0/Dir0/
    - assets/stellarium/static/
    - assets/stellarium/static/fonts/
    - assets/stellarium/static/imgs/
    - assets/stellarium/static/imgs/symbols/
    - assets/stellarium/static/js/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
