name: CI

# Progressive CI for the NINA → OpenAstro Ara port.
#
# This file replaces the upstream NINA Windows build (build-and-test.yml) and
# the NINA Backblaze release pipeline (build-and-release.yml), both of which
# were incompatible with the port direction (.NET 10 daemon on linux-arm64,
# Debian 13 / RPi target — see design/PORT_PLAYBOOK.md §2.1, §13).
#
# Growth schedule, matching the playbook phases:
#
#   NOW (pre-Phase 0.5)
#     → sanity-checks only: design docs exist + workflow files parse.
#       Codebase is still NINA / .NET 8 / WPF; no meaningful build possible
#       on Linux until Phase 0.5p (.NET 10 bump).
#
#   Phase 0.5p (.NET 10 bump)
#     → add `server-build` job: `dotnet restore && dotnet build` on
#       ubuntu-latest with .NET 10 SDK.
#
#   Phase 4 (OpenAstroAra.Server scaffold)
#     → extend `server-build`: `dotnet publish OpenAstroAra.Server
#       -c Release -r linux-arm64 --self-contained` to produce the
#       Debian 13 (Trixie) / RPi 4-5 daemon artifact (per §13.1).
#
#   Phase 11 (Flutter scaffold)
#     → add `client-test` job: `flutter analyze && flutter test` on Linux.
#
#   Phase 14 (full CI matrix per §14.3)
#     → full matrix: server-build (linux), server-e2e (Docker arm64),
#       client-macos / -windows / -linux / -test, settings-registry gate,
#       Alpaca-simulator pinning auto-download (§14.5.1).
#
# Until then, every job in this file MUST stay green on a vanilla `port/ara`
# checkout — sub-PRs that delete or rename projects should not break CI.

on:
  pull_request:
  push:
    branches:
      - master
      - port/ara
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanity:
    name: Sanity (design docs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no LFS)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.x — pinned per zizmor + CodeRabbit security finding on PR #12
        with:
          lfs: false
          persist-credentials: false  # checkout step needs no push access; reduces blast radius

      - name: Verify required design docs exist
        run: |
          set -e
          for f in \
            design/PORT_PLAYBOOK.md \
            design/COMMIT-PR-RULES.md \
            design/GAPS-ARA.md \
          ; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Required design doc missing or empty"
              exit 1
            fi
            echo "ok: $f ($(wc -l < "$f") lines)"
          done

      # NOTE: We intentionally don't yaml-lint workflow files here.
      # GitHub Actions' own parser is the ultimate validator — a malformed
      # workflow won't run at all. A lint step is duplicate work.
      # When `actionlint` style checks are wanted (e.g., shellcheck inside
      # `run:` blocks), re-add via `rhysd/actionlint` at Phase 14.

  server-build:
    name: Server (build + cross-publish + Docker)
    runs-on: ubuntu-latest
    needs: sanity
    steps:
      - name: Checkout (no LFS)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.x — pinned per zizmor + CodeRabbit security finding on PR #12
        with:
          lfs: false
          persist-credentials: false

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4.x pinned per zizmor pattern
        with:
          dotnet-version: '10.0.x'

      - name: dotnet restore (Server)
        run: dotnet restore OpenAstroAra.Server/OpenAstroAra.Server.csproj

      - name: dotnet build (Server, Release)
        run: dotnet build OpenAstroAra.Server/OpenAstroAra.Server.csproj -c Release --no-restore

      # Publish self-contained for linux-arm64 only. The §13 deployment
      # target is Debian 13 / RPi 4-5 (arm64); per the 2026-05-26 decision
      # logged in design/PORT_DECISIONS.md, we don't build for linux-x64
      # at all, which deviates from the §11.1 playbook spec but matches
      # the actual deployment surface. AOT is disabled for this first cut
      # — cross-compiling AOT from ubuntu-latest x64 host to linux-arm64
      # needs clang + sysroot setup that we'll add in a Phase 14 follow-up
      # alongside the rest of the §14.3 matrix. Non-AOT --self-contained
      # still produces a deployable single-folder ELF artifact, which is
      # what the Docker image consumes.
      - name: dotnet publish (linux-arm64, self-contained, non-AOT)
        run: |
          dotnet publish OpenAstroAra.Server/OpenAstroAra.Server.csproj \
            -c Release -r linux-arm64 --self-contained \
            -p:PublishAot=false \
            -o ./publish/arm64

      # Verify the arm64 output is a real ELF binary (catches "publish
      # succeeded but produced no executable" surprises that the dotnet
      # CLI sometimes silently misses).
      - name: Verify cross-compile output
        run: |
          set -e
          file ./publish/arm64/OpenAstroAra.Server | tee /dev/stderr | grep -q 'aarch64'

      # Build the arm64 Docker image via buildx. Buildx + qemu lets the
      # x64 runner cross-build arm64 images without a real Pi.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3 pinned per zizmor immutable-ref policy
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3 pinned per zizmor immutable-ref policy

      - name: Build Docker image (arm64)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6 pinned per zizmor immutable-ref policy
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          tags: openastroara-server:arm64
          load: false  # smoke test only — don't load arm64 manifest into x64 docker daemon
