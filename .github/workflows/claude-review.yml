name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

# Cancel an in-progress review if a newer commit is pushed to the same PR,
# so rapid pushes don't stack up redundant reviews (saves usage).
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip Dependabot PRs: GitHub runs them with an isolated token that has no
    # access to the CLAUDE_CODE_OAUTH_TOKEN secret, so the action's token
    # exchange 401s and the check shows red. Dependency bumps gain little from
    # an AI review anyway. See Settings → Secrets → Dependabot to enable instead.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: anthropics/claude-code-action@fa7e2f0a29a126f0b81cdcf360561b36e44cf608  # v1
        with:
          # Subscription (Pro/Max) auth. Generate locally with `claude setup-token`
          # and store as an org or repo secret named CLAUDE_CODE_OAUTH_TOKEN.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Keep the whole review in ONE top-level comment that updates in place,
          # instead of posting a new comment on every push.
          use_sticky_comment: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are reviewing this pull request. The PR branch is already
            checked out in the current working directory.

            Focus ONLY on genuinely important issues, in these categories:
            - Potential bugs or logic errors
            - Correctness
            - Security implications
            - Performance considerations

            Rules:
            - Be concise. Use short bullet points.
            - Skip minor style/formatting nitpicks (a linter/clang-format handles those).
            - If you find no significant issues, say so briefly.
            - End your comment with a sign-off line:
              "✅ Approved" if no significant issues, or
              "⚠️ Issues found" if there are things to address.

            Post your review as a SINGLE top-level comment: use the Write tool
            to save it to /tmp/review.md, then run exactly
            `gh pr comment <PR NUMBER> --body-file /tmp/review.md`.
            Do not submit the review text as a chat message.
          # Read-only exploration tools included: without them the agent burns
          # its turns on permission denials while trying to read the checkout
          # (24 denials on PR #861's last run) and sometimes gives up before
          # posting. Grep/Glob/Read touch nothing; the only write surfaces
          # remain Write (for the review body) and `gh pr comment`.
          claude_args: |
            --model sonnet
            --allowedTools "Read,Grep,Glob,Write,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git log:*),Bash(git diff:*),Bash(git show:*)"

      # The action exits 0 even when the agent never manages to post its
      # comment (seen on PR #861: 20 permission denials, green check, no
      # review anywhere). The merge-gate treats the review BODY as the
      # artifact, so a run that produced no comment must fail the check.
      - name: Assert the review comment posted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The action refuses to run on a PR that modifies this very workflow
          # (it requires the file to match the default branch). That skip is
          # loud in the log and only possible on a workflow-editing PR, which
          # the maintainer reviews by eye — exempt it so such PRs aren't
          # permanently red, while every normal PR still requires a comment.
          if gh pr diff "${{ github.event.pull_request.number }}" \
              --repo "${{ github.repository }}" --name-only \
              | grep -qx ".github/workflows/claude-review.yml"; then
            echo "::warning::This PR modifies the review workflow — the action skips itself on such PRs; passing without a review comment. Review it by eye."
            exit 0
          fi
          # Only the BOT's comments count, and only ones touched during THIS
          # run — a human writing "Approved" in discussion, or a sticky
          # comment left over from a previous commit's review, must not
          # satisfy the gate.
          # Anchor freshness to THIS run's creation: a comment from a previous
          # commit's review round must not satisfy the gate (on #861 a
          # 15-min-old round-2 comment green-lit a run that posted nothing).
          started="$(gh run view "$GITHUB_RUN_ID" --repo "${{ github.repository }}" --json createdAt --jq .createdAt)"
          if gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --paginate \
              | jq -r --arg since "$started" \
              '.[] | select(.user.login | test("^(claude|github-actions)(\\[bot\\])?$")) | select(.updated_at >= $since) | .body' \
              | grep -qE "Approved|Issues found"; then
            echo "Review comment found."
          else
            echo "::error::The review agent finished without posting its comment — failing rather than green-lighting a review that does not exist."
            exit 1
          fi
