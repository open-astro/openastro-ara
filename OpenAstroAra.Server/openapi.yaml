# OpenAstro Ara — REST + WebSocket API contract
#
# Source of truth for the server-client wire protocol. Per PORT_PLAYBOOK.md §9 (Phase 5):
#   - URL-versioned (/api/v1/...)
#   - No auth in v0.0.1 (trusted-LAN posture per §67)
#   - JSON for ops, JPEG bytes for previews, FITS bytes for full downloads
#   - WebSocket at /api/v1/stream for live updates
#
# Endpoint groups land incrementally:
#   - Phase 4 (DONE): /healthz, /api/v1/server/info
#   - Phase 6: /api/v1/equipment/discover/{type} (discovery) + /equipment/{type}/{connect,disconnect}
#   - Phase 7: /api/v1/sequence — load, start/pause/resume/abort, status
#   - Phase 8: /api/v1/image — list, FITS download, preview JPEG
#   - Phase 9: /api/v1/log, /api/v1/stream (WebSocket), notifications
#
# Phase 5 = the spec itself. Server code references this file as the contract;
# `Microsoft.AspNetCore.OpenApi` generates the live `/openapi/v1.json` from
# minimal-API endpoints; Scalar UI mounts it at `/scalar/v1` per §49.
#
# Design log: see design/API_CONTRACT.md for one entry per non-obvious wire-shape decision.

openapi: 3.1.0

info:
  title: OpenAstro Ara Server API
  version: 0.0.1-ara.1
  description: |
    REST + WebSocket API for the OpenAstro Ara headless daemon. Speaks to the
    Flutter WILMA client (`client/openastroara_client`). Designed for trusted-LAN
    deployments; v0.1.0 will add opt-in remote-access mode with TLS + token auth.

    **Lineage:** forked from N.I.N.A. (Nighttime Imaging 'N' Astronomy). See repo
    root LICENSE.txt, COPYING, AUTHORS for the inherited attribution. NOTICE.md
    (added at Phase 15) carries the full lineage record.
  license:
    name: MPL-2.0
    url: https://www.mozilla.org/en-US/MPL/2.0/

servers:
  - url: http://{host}:{port}/api/v1
    description: Direct LAN connection (default)
    variables:
      host:
        default: openastroara.local
        description: Pi hostname or IP; discoverable via mDNS service _openastroara._tcp.local
      port:
        default: "5555"

# ─── Endpoint group: Server ────────────────────────────────────────────────────

paths:
  /server/info:
    get:
      summary: Server identification + capabilities
      description: |
        Lightweight identity payload per §60.4. WILMA clients call this after mDNS
        discovery to verify the daemon they're connecting to and to fetch the
        server's stable UUID for profile pinning.
      tags: [Server]
      responses:
        '200':
          description: Identity payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerInfo'

  /server/state:
    get:
      summary: Current server-state snapshot (§60.4 hydration)
      description: |
        Single-shot snapshot of all session-level state — equipment connection
        status, in-flight sequence (if any), recent log tail. Used by clients
        that just reconnected to rebuild their view without replaying the WS
        event log.
      tags: [Server]
      responses:
        '200':
          description: State snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStateSnapshot'

# ─── Endpoint group: Equipment (Phase 6) ──────────────────────────────────────

  /equipment/discover/{type}:
    get:
      summary: List discovered devices of a given type
      description: |
        Triggers Alpaca discovery (UDP broadcast on port 32227) and returns
        the result. Cached for §32.4 cache_ttl; pass `?force_refresh=true`
        to bypass.

        The discovery path uses an explicit `/discover/` segment so the
        per-device current-state GETs at `/equipment/{type}` (where `{type}`
        is a literal segment like `camera`/`telescope`) do not collide with
        discovery. See PORT_PLAYBOOK.md §10.6.
      tags: [Equipment]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/DeviceType'
        - name: force_refresh
          in: query
          schema: { type: boolean, default: false }
      responses:
        '200':
          description: Discovered devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DiscoveredDevice' }

  /equipment/{type}/connect:
    post:
      summary: Connect to a device
      tags: [Equipment]
      parameters:
        - name: type
          in: path
          required: true
          schema: { $ref: '#/components/schemas/DeviceType' }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectRequest'
      responses:
        '202':
          description: Connect started (state transition reported via WS)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationAccepted' }

  /equipment/{type}/disconnect:
    post:
      summary: Disconnect the currently-connected device of this type
      tags: [Equipment]
      parameters:
        - name: type
          in: path
          required: true
          schema: { $ref: '#/components/schemas/DeviceType' }
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Disconnect started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationAccepted' }

# ─── Endpoint group: Sequence (Phase 7) ───────────────────────────────────────

  /sequence:
    get:
      summary: Get the current sequence (if any) + execution state
      tags: [Sequence]
      responses:
        '200':
          description: Current sequence + state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SequenceState' }
    put:
      summary: Replace the current sequence with the supplied JSON
      description: |
        Schema per §38. Validation runs server-side; failed validation returns
        422 with a list of issues (per §73 error shape).
      tags: [Sequence]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Sequence' }
      responses:
        '200':
          description: Loaded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SequenceState' }
        '422':
          description: Validation failure
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Problem' }

  /sequence/start:
    post:
      summary: Start (or resume) execution of the loaded sequence
      description: |
        **Idempotency-Key required** per §60.5 — start is one of the operations
        where double-execution would burn equipment time + create duplicate frames.
      tags: [Sequence]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKeyRequired'
      responses:
        '202':
          description: Started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationAccepted' }

  /sequence/pause:
    post:
      summary: Pause execution after the current instruction completes
      tags: [Sequence]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Pause requested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationAccepted' }

  /sequence/abort:
    post:
      summary: Abort execution immediately (per §35.3 emergency stop semantics)
      tags: [Sequence]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Abort initiated; mount parks per §57 + alarm fires per §35.5
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OperationAccepted' }

# ─── Endpoint group: Image (Phase 8) ──────────────────────────────────────────

  /image:
    get:
      summary: List captured frames in the library
      description: |
        Paginated; default 50 per page. Filter by `target=...`, `date_from=...`,
        `date_to=...`. Items return metadata only; use `/image/{id}` to download.
      tags: [Image]
      parameters:
        - name: target
          in: query
          schema: { type: string }
        - name: date_from
          in: query
          schema: { type: string, format: date-time }
        - name: date_to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1, minimum: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 50, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Page of frames
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FramePage' }

  /image/{id}:
    get:
      summary: Get frame metadata
      tags: [Image]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Frame metadata
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Frame' }

  /image/{id}/fits:
    get:
      summary: Download the FITS file
      tags: [Image]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: FITS bytes
          content:
            application/fits:
              schema: { type: string, format: binary }

  /image/{id}/preview:
    get:
      summary: Get the server-rendered JPEG preview
      description: |
        Stretched JPEG per §65. Stretch parameters configurable via query string.
      tags: [Image]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: stretch
          in: query
          schema: { type: string, enum: [auto, linear, asinh, log] }
        - name: max_dim
          in: query
          schema: { type: integer, default: 1920, minimum: 256, maximum: 4096 }
      responses:
        '200':
          description: JPEG bytes
          content:
            image/jpeg:
              schema: { type: string, format: binary }

# ─── Endpoint group: Log (Phase 9) ────────────────────────────────────────────

  /log:
    get:
      summary: Recent log lines
      tags: [Log]
      parameters:
        - name: tail
          in: query
          schema: { type: integer, default: 200, minimum: 1, maximum: 10000 }
        - name: level
          in: query
          schema: { type: string, enum: [Debug, Information, Warning, Error] }
      responses:
        '200':
          description: Log lines
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LogLine' }

# ─── Endpoint group: Profile (§37 — Phase 12h.6) ──────────────────────────────
# WILMA's editable settings panels persist via these endpoints. Each section
# is one DTO + GET + PUT pair. v0.0.1 stores the active profile in-memory
# (resets on daemon restart); Phase 13 adds file-based persistence.
# Multi-profile + §42 import/export lands in v0.1.0.

  /profile/imaging-defaults:
    get:
      summary: Get active profile's imaging defaults
      description: |
        Phase 12h.6a — first profile section to land end-to-end. WILMA hydrates
        its `imagingDefaultsProvider` from this on app start.
      tags: [Profile]
      responses:
        '200':
          description: Current imaging-defaults state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImagingDefaults' }
    put:
      summary: Replace active profile's imaging defaults
      description: |
        Full-replace semantics — WILMA's "Save" buttons hold complete section
        state client-side so PATCH partial-update is unnecessary for v0.0.1.
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImagingDefaults' }
      responses:
        '200':
          description: New state (echo of input)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImagingDefaults' }

  /profile/equipment-connection:
    get:
      summary: Get active profile's equipment auto-connect bools
      description: |
        Phase 12h.6L — §52.1 connection-lifecycle defaults. One bool per
        device type for auto-connect-on-daemon-boot.
      tags: [Profile]
      responses:
        '200':
          description: Current equipment-connection state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EquipmentConnection' }
    put:
      summary: Replace active profile's equipment auto-connect bools
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EquipmentConnection' }
      responses:
        '200':
          description: New state (echo of input)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/EquipmentConnection' }

  /profile/phd2:
    get:
      summary: Get active profile's PHD2 / guider settings
      description: |
        Phase 12h.6k — §63 PHD2 section.
      tags: [Profile]
      responses:
        '200':
          description: Current PHD2-settings state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Phd2Settings' }
    put:
      summary: Replace active profile's PHD2 / guider settings
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Phd2Settings' }
      responses:
        '200':
          description: New state (echo of input)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Phd2Settings' }

  /profile/optics:
    get:
      summary: Get active profile's optics settings
      description: |
        §36 imaging-train optics + sensor geometry. The Sky Atlas Planning
        tab's Frame mode reads this to draw the field-of-view box (works with
        the camera offline since sensor dimensions are cached here).
      tags: [Profile]
      responses:
        '200':
          description: Current optics-settings state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpticsSettings' }
    put:
      summary: Replace active profile's optics settings
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OpticsSettings' }
      responses:
        '200':
          description: New state (echo of input)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OpticsSettings' }
        '400':
          description: reducer_factor <= 0, or a geometry field is negative
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Problem' }

  /profile/diagnostics-mode:
    get:
      summary: Get active profile's diagnostics mode
      description: |
        Phase 12h.6j — §51 diagnostics-mode section. Single-enum section
        wrapped in a DTO to leave room for future per-severity threshold
        knobs without a wire-shape break.
      tags: [Profile]
      responses:
        '200':
          description: Current diagnostics-mode state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiagnosticsMode' }
    put:
      summary: Replace active profile's diagnostics mode
      tags: [Profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DiagnosticsMode' }
      responses:
        '200':
          description: New state (echo of input)
          content:
