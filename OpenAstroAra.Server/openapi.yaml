# ─── Endpoint group: Stream (Phase 9 — WebSocket) ─────────────────────────────
# WebSocket endpoints aren't expressible in OpenAPI 3.1 paths; the full
# wire-level invariants are documented here. See §60.9 for the canonical
# spec + §60.10 for the event catalog. Independent client implementations
# can rely on this section being the source of truth.
#
# Endpoint: ws://{host}:{port}/api/v1/ws  (NOT /api/v1/stream — common mistake)
#
# Upgrade headers:
#   X-Ara-WS-Version: 1                  (required; mismatched → 426 Upgrade Required)
#   Sec-WebSocket-Extensions: permessage-deflate  (default; omit to disable compression)
#
# Frame size:    1 MB max (REST cap is 64 KB per §60.3; WS is larger to accommodate
#                batched notifications + resume replay bursts).
# Compression:   permessage-deflate enabled by default; ~70% savings on JSON traffic.
# Heartbeat:     server sends a WS ping every 30 s; client must pong within 60 s.
#                2 consecutive missed pongs → server closes with code 1011
#                (reason: server_initiated_disconnect_unresponsive_client).
#                Client should likewise close + trigger §32 reconnect modal if no
#                server activity (ping OR event) seen for 90 s.
#
# Resume protocol: after the WebSocket upgrade completes, the client may send
# its FIRST message as a JSON resume request:
#   { "resume_token": "<opaque-string-from-prior-server-state-snapshot>" }
# Server responds with one of:
#   { "resumed": true,  "missed_events": <n>, "last_event_id": "<id>" }
#     → server then immediately replays missed events as normal events
#   { "resumed": false, "code": "resume_token_expired", "reason": "..." }
#     → fresh subscription, no replay
#   { "resumed": false, "code": "resume_token_invalid" }
#     → client should clear local cursor + reconnect fresh
# If the client's first message is anything OTHER than a resume request,
# server treats the connection as fresh (no replay).
# Resume tokens are issued by REST `GET /api/v1/server/state` and have
# a 1-hour validity window. After that, fall back to fresh /state rehydrate.
#
# Event envelope (every server-sent message):
#   { "type": "frame.complete",
#     "ts":   "2026-05-23T19:14:33.123Z",
#     "id":   "evt-7f3a9b",                # monotonic per server boot
#     "payload": { ...event-specific... } }
#
# Close codes:
#   1000 — Normal closure (both directions)
#   1001 — Going away (network change, app backgrounded)
#   1009 — Frame too large (>1 MB)
#   1011 — Server-side error / unresponsive client / client_too_slow backpressure
#   1012 — Service restart imminent (pairs with server.restart_imminent event per §34.7)
#   4001 — (v0.1.0 only) Auth required / token invalid (remote-access mode per §67.4)
#   4002 — Resume token expired (client clears local + reconnects with REST snapshot)
#   4003 — WS protocol version mismatch (X-Ara-WS-Version negotiation failed)
#   4004 — Single-client policy: another WILMA took over (§27)
#
# Backpressure: per-client send buffer limited to 256 messages (§66.2). If exceeded,
# server closes with code 1011 + reason `client_too_slow`. Client reconnects with
# resume protocol to catch up.
#
# Event catalog (see §60.10 for full schemas):
#   equipment.state         — connection + per-device runtime state changes
#   sequence.progress       — frame-completion, target-switch, instruction-step events
#   frame.complete          — new frame written to library; payload includes preview URL
#   log.line                — server log emission (filterable per channel subscribe)
#   notification            — §46 in-app feed entry (info / warning / critical / urgent)
#   diagnostic.alert        — §51 real-time acquisition diagnostic flag
#   server.restart_imminent — pairs with 1012 close per §34.7 update flow
#   operation.{started|progress|complete|failed} — long-running op state from REST 202s

# ─── Reusable parameters + schemas ────────────────────────────────────────────

components:

  parameters:
    # Cursor pagination per §60.2. Use these on every list endpoint that
    # paginates. Default limit 50, max 500. cursor is opaque (base64-encoded
    # JSON internally) — clients echo it back without interpretation.
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 50, minimum: 1, maximum: 500 }
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
      description: Opaque pagination cursor returned by a prior response's `next_cursor`. Omit on the first request.

    # Idempotency-Key per §60.5. 24h dedup window.
    # IdempotencyKey: optional — server processes without dedup if omitted.
    # IdempotencyKeyRequired: same header but request fails with 400 if missing.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      schema: { type: string, format: uuid }
      description: Client-generated UUID. Same key + same body within 24h returns the cached response; same key + different body returns 409 Conflict. Omit to opt out of dedup.
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, format: uuid }
      description: Required for this endpoint per §60.5. Same semantics as the optional `IdempotencyKey` parameter.

  schemas:

    ServerInfo:
      type: object
      required: [server_uuid, nickname, version, api, mdns_service]
      properties:
        server_uuid:
          type: string
          format: uuid
          description: Stable identifier for this install (persisted on disk).
        nickname:
          type: string
          description: User-friendly server name (defaults to hostname).
        version:
          type: string
          description: Daemon version (e.g., "0.0.1-ara.1").
        api:
          type: string
          enum: [v1]
        mdns_service:
          type: string
          description: mDNS service type advertised by this daemon.
          example: _openastroara._tcp.local
        tier:
          type: string
          enum: [scaffold, ready]
          description: |
            "scaffold" during Phase 4 (this scaffold only has /healthz +
            /server/info). Becomes "ready" once Phase 6-9 endpoints land.

    ServerStateSnapshot:
      type: object
      description: |
        Full UI-rehydrate snapshot per §60.4. Called on first connect and after
        every reconnect. Includes `ws_resume_token` — the cursor clients pass
        as the first WS message to replay events missed while disconnected
        (see Stream section above).
      required: [server_uuid, equipment, sequence, log_tail, ws_resume_token]
      properties:
        server_uuid: { type: string, format: uuid }
        equipment:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EquipmentState'
        sequence: { $ref: '#/components/schemas/SequenceState', nullable: true }
        log_tail:
          type: array
          items: { $ref: '#/components/schemas/LogLine' }
        ws_resume_token:
          type: string
          description: Opaque replay cursor for the WebSocket stream. Valid for 1 hour. Despite the name, this is NOT an auth token (ARA has no API auth per §67).

    DeviceType:
      type: string
      description: |
        Device-type tokens used both as path parameters in `/equipment/{type}/...`
        endpoints and as the `type` discriminator on `DiscoveredDevice`. The token
        set matches the server's per-device literal route segments (e.g.
        `/equipment/filterwheel/connect`) — multi-word types are concatenated,
        not snake_cased, so the URL paths and the JSON enum tokens are identical.

        The C# enum (`OpenAstroAra.Server.Contracts.DeviceType`) is PascalCase
        (`FilterWheel`, etc.); `Enum.TryParse<>(ignoreCase: true)` accepts these
        all-lowercase tokens unchanged.
      enum: [camera, telescope, focuser, filterwheel, rotator, dome, safetymonitor, switch, observingconditions, covercalibrator, flatdevice, guider]

    DiscoveredDevice:
      type: object
      required: [unique_id, name, type, host_name, ip_address, ip_port, alpaca_device_number]
      properties:
        unique_id: { type: string }
        name: { type: string }
        type: { $ref: '#/components/schemas/DeviceType' }
        host_name: { type: string }
        ip_address: { type: string }
        ip_port: { type: integer }
        alpaca_device_number: { type: integer }
        use_https: { type: boolean, default: false }

    ConnectRequest:
      type: object
      description: |
        Idempotency is handled via the `Idempotency-Key` HEADER (see the shared
        parameter), not via a body field. Header convention matches the rest
        of the API surface per §60.5.
      required: [device]
      properties:
        device: { $ref: '#/components/schemas/DiscoveredDevice' }

    EquipmentState:
      type: object
      properties:
        state: { type: string, enum: [disconnected, connecting, connected, error] }
        device: { $ref: '#/components/schemas/DiscoveredDevice', nullable: true }
        last_event_at: { type: string, format: date-time, nullable: true }

    SequenceState:
      type: object
      properties:
        loaded: { type: boolean }
        running: { type: boolean }
        paused: { type: boolean }
        current_target: { type: string, nullable: true }
        current_instruction: { type: string, nullable: true }
        frames_completed: { type: integer, minimum: 0 }
        frames_total: { type: integer, minimum: 0 }

    Sequence:
      type: object
      description: |
        Full sequence document. Schema per §38. Phase 7 lands the detailed
        properties; this stub allows the contract to be referenced today.
      additionalProperties: true

    Frame:
      type: object
      required: [id, target, captured_at, exposure_sec, filter, file_size]
      properties:
        id: { type: string }
        target: { type: string }
        captured_at: { type: string, format: date-time }
        exposure_sec: { type: number }
        filter: { type: string }
        file_size: { type: integer, minimum: 0 }
        hfr: { type: number, nullable: true }
        stars: { type: integer, nullable: true }
        quality_score: { type: number, nullable: true, description: "§50.10 composite score" }

    FramePage:
      type: object
      description: |
        Cursor-paginated frame list per §60.2. `next_cursor: null` + `has_more: false`
        means end of results. `total` only present on the first page (request without
        `cursor` param); computing total over a moving window is expensive and
        rarely needed once scrolling.
      required: [items, has_more]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Frame' }
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
        total:
          type: integer
          description: Only included on the first page; subsequent pages omit it.

    LogLine:
      type: object
      required: [ts, level, message]
      properties:
        ts: { type: string, format: date-time }
        level: { type: string, enum: [Debug, Information, Warning, Error] }
        message: { type: string }
        source: { type: string, nullable: true }

    ImagingDefaults:
      type: object
      description: |
        §37 imaging-defaults profile section. Mirrors WILMA's `ImagingDefaults`
        client model field-for-field. `frame_kind` is one of `light`/`dark`/`bias`/`flat`.
      required:
        [exposure_seconds, gain, offset, bin, frame_kind, cooler_target_c, cooler_ramp_c_per_min, warmup_at_session_end]
      properties:
        exposure_seconds:       { type: integer, minimum: 1, maximum: 3600 }
        gain:                   { type: integer, minimum: 0, maximum: 1000 }
        offset:                 { type: integer, minimum: 0, maximum: 500 }
        bin:                    { type: integer, minimum: 1, maximum: 4 }
        frame_kind:             { type: string, enum: [light, dark, bias, flat] }
        cooler_target_c:        { type: number, format: double, minimum: -60, maximum: 30 }
        cooler_ramp_c_per_min:  { type: number, format: double, minimum: 0, maximum: 10 }
        warmup_at_session_end:  { type: boolean }

    StorageSettings:
      type: object
      description: |
        §29 storage profile section. Mirrors WILMA's `StorageSettings` client model.
        `file_format` is one of `fits`/`xisf`/`fits_rice`/`fits_gzip`; `compression`
        is one of `off`/`rice`/`gzip`.
      required: [save_directory, file_format, compression, filename_template]
      properties:
        save_directory:    { type: string, minLength: 1 }
        file_format:       { type: string, enum: [fits, xisf, fits_rice, fits_gzip] }
        compression:       { type: string, enum: [off, rice, gzip] }
        filename_template: { type: string, minLength: 1 }
        # §29 disk-space monitor thresholds (whole GiB free on the save volume). Optional for back-compat;
        # the monitor falls back to 10/2 GiB when omitted or set non-positive/inverted (critical >= warn).
        min_free_disk_warn_gb:     { type: integer, minimum: 1, default: 10 }
        min_free_disk_critical_gb: { type: integer, minimum: 1, default: 2 }

    EquipmentConnection:
      type: object
      description: |
        §52.1 auto-connect-on-boot bools. One field per device type.
      required: [camera, mount, focuser, filter_wheel, rotator, guider, flat_panel, dome, weather, safety_monitor]
      properties:
        camera:         { type: boolean }
        mount:          { type: boolean }
        focuser:        { type: boolean }
        filter_wheel:   { type: boolean }
        rotator:        { type: boolean }
        guider:         { type: boolean }
        flat_panel:     { type: boolean }
        dome:           { type: boolean }
        weather:        { type: boolean }
        safety_monitor: { type: boolean }

    Phd2Settings:
      type: object
      description: |
        §63 PHD2 / guider profile section. Mirrors WILMA's `Phd2Settings`.
      required:
        [host, port, phd2_profile, dither_enabled, dither_every_n_frames,
         dither_pixels, settle_pixels, settle_time_sec, settle_timeout_sec,
         force_calibration_each_session]
      # The §63.5 guider-engine fields below are OPTIONAL: they carry server-side defaults so a profile.json
      # written before this field set still deserializes correctly (missing key → default).
      properties:
        host:                           { type: string, minLength: 1 }
        port:                           { type: integer, minimum: 1024, maximum: 65535 }
        phd2_profile:                   { type: string, minLength: 1 }
        dither_enabled:                 { type: boolean }
        dither_every_n_frames:          { type: integer, minimum: 1 }
        dither_pixels:                  { type: number, format: double, minimum: 0 }
        settle_pixels:                  { type: number, format: double, minimum: 0 }
        settle_time_sec:                { type: integer, minimum: 0 }
        settle_timeout_sec:             { type: integer, minimum: 1 }
        force_calibration_each_session: { type: boolean }
        # §63.5 guider-engine config (pushed to the guider daemon on connect).
        guide_focal_length:             { type: integer, minimum: 0 }
        guide_pixel_size:               { type: number, format: double, minimum: 0 }
        ra_aggressiveness:              { type: number, format: double, minimum: 0, maximum: 1 }
        dec_aggressiveness:             { type: number, format: double, minimum: 0, maximum: 1 }
        minimum_move:                   { type: number, format: double, minimum: 0 }
        dec_guide_mode:                 { type: string, enum: [auto, north, south, off] }

    DiagnosticsMode:
      type: object
      description: |
        §51 diagnostics-mode profile section. Single-enum picker.
      required: [mode]
      properties:
        mode: { type: string, enum: [notify_only, pause_on_critical, abort_on_critical] }

    OpticsSettings:
      type: object
      description: |
        §36 imaging-train optics + sensor geometry — the inputs the Planning
        tab's Frame mode needs to draw the FOV box. Pixel scale =
        206.265 × `pixel_size_um` ÷ (`focal_length_mm` × `reducer_factor`);
        FOV = sensor_px × pixel scale. `reducer_factor` is 1.0 for none,
        0.8 for a 0.8× reducer, 2.0 for a 2× barlow. 0 values mean
        "unset/unknown" — sensor dimensions are cached on first camera
        connect so framing works with the camera offline.
      required: [focal_length_mm, reducer_factor, sensor_width_px, sensor_height_px, pixel_size_um]
      properties:
        focal_length_mm:  { type: number, format: double, minimum: 0 }
        reducer_factor:   { type: number, format: double, exclusiveMinimum: 0 }
        sensor_width_px:  { type: integer, minimum: 0 }
        sensor_height_px: { type: integer, minimum: 0 }
        pixel_size_um:    { type: number, format: double, minimum: 0 }

    PlateSolveSettings:
      type: object
      description: |
        §37.10 plate-solve profile section. Mirrors WILMA's `PlateSolveSettings`.
        `engine` is one of `astap`/`astrometry_net`/`platesolve2`.
      required:
        [engine, path_or_endpoint, index_download_path, search_radius_deg,
         downsample_factor, timeout_seconds, use_blind_fallback,
         center_after_slew, sync_to_coordinates, max_iterations,
         convergence_tolerance_arcsec]
      properties:
        engine:                       { type: string, enum: [astap, astrometry_net, platesolve2] }
        path_or_endpoint:             { type: string, minLength: 1 }
        index_download_path:          { type: string, minLength: 1 }
        search_radius_deg:            { type: number, format: double, minimum: 0, maximum: 180 }
        downsample_factor:            { type: integer, minimum: 1, maximum: 8 }
        timeout_seconds:              { type: integer, minimum: 1 }
        use_blind_fallback:           { type: boolean }
        center_after_slew:            { type: boolean }
        sync_to_coordinates:          { type: boolean }
        max_iterations:               { type: integer, minimum: 1 }
        convergence_tolerance_arcsec: { type: number, format: double, minimum: 0 }

    AutofocusSettings:
      type: object
      description: |
        §37.11 autofocus profile section. Mirrors WILMA's `AutofocusSettings`.
        `method` is one of `hfr_v_curve`/`brightest_star_hfr`/`fwhm`.
      required:
        [method, steps, step_size, exposure_seconds, binning, af_filter,
         run_after_filter_change, trigger_temp_delta_c, trigger_hfr_drift_pct,
         every_n_hours, abort_sequence_on_af_failure, restore_position_on_failure]
      properties:
        method:                       { type: string, enum: [hfr_v_curve, brightest_star_hfr, fwhm] }
        steps:                        { type: integer, minimum: 3, maximum: 31 }
        step_size:                    { type: integer, minimum: 1 }
        exposure_seconds:             { type: integer, minimum: 1 }
        binning:                      { type: integer, minimum: 1, maximum: 4 }
        af_filter:                    { type: string, minLength: 1 }
        run_after_filter_change:      { type: boolean }
        trigger_temp_delta_c:         { type: number, format: double, minimum: 0 }
        trigger_hfr_drift_pct:        { type: number, format: double, minimum: 0, maximum: 100 }
        every_n_hours:                { type: integer, minimum: 0 }
        abort_sequence_on_af_failure: { type: boolean }
        restore_position_on_failure:  { type: boolean }

    SafetyPolicies:
      type: object
      description: |
        §35 safety policies profile section. Mirrors WILMA's `SafetyPolicies`.
        Enums use snake_case strings on the wire.
      required:
        [on_unsafe, auto_resume_when_safe, resume_delay_min, meridian_flip_auto,
         meridian_pause_min, meridian_recenter, meridian_recal_guider,
         on_altitude_limit, park_if_no_more_targets, on_guider_lost,
         guider_retry_timeout_sec, skip_target_if_recovery_fails]
      properties:
        on_unsafe:                     { type: string, enum: [pause_and_park, park_only, abort_and_park, ignore] }
        auto_resume_when_safe:         { type: boolean }
        resume_delay_min:              { type: integer, minimum: 0 }
        meridian_flip_auto:            { type: boolean }
        meridian_pause_min:            { type: integer, minimum: 0 }
        meridian_recenter:             { type: boolean }
        meridian_recal_guider:         { type: boolean }
        on_altitude_limit:             { type: string, enum: [skip_target, pause_sequence, abort_sequence] }
        park_if_no_more_targets:       { type: boolean }
        on_guider_lost:                { type: string, enum: [pause_and_retry, skip_target, abort_sequence] }
        guider_retry_timeout_sec:      { type: integer, minimum: 0 }
        skip_target_if_recovery_fails: { type: boolean }
        # §29 — action when the disk-space monitor hits the critical threshold. Optional for back-compat
        # (defaults to "warn"); "abort" also halts any running sequence.
        on_disk_space_critical:        { type: string, enum: [warn, abort], default: warn }

    FilenamesSettings:
      type: object
      description: |
        §29.2 filenames profile section. Mirrors WILMA's `FilenamesSettings`.
        `date_separator` is one of `forward_slash`/`underscore`/`dash`.
      required: [date_separator, compress_darks_and_bias]
      properties:
        date_separator:          { type: string, enum: [forward_slash, underscore, dash] }
        compress_darks_and_bias: { type: boolean }

    SiteSettings:
      type: object
      description: |
        §37.12 site profile section. Mirrors WILMA's `SiteSettings` field-for-field.
        `twilight_definition` is one of `civil`/`nautical`/`astronomical`.
      required:
        [site_name, latitude_deg, longitude_deg, elevation_m, time_zone,
         use_custom_horizon, default_horizon_altitude_deg, bortle_class,
         typical_seeing_arcsec, twilight_definition]
      properties:
        site_name:                    { type: string, minLength: 1 }
        latitude_deg:                 { type: number, format: double, minimum: -90,  maximum: 90 }
        longitude_deg:                { type: number, format: double, minimum: -180, maximum: 180 }
        elevation_m:                  { type: number, format: double, minimum: -500, maximum: 9000 }
        time_zone:                    { type: string, minLength: 1 }
        use_custom_horizon:           { type: boolean }
        default_horizon_altitude_deg: { type: number, format: double, minimum: 0, maximum: 90 }
        bortle_class:                 { type: integer, minimum: 1, maximum: 9 }
        typical_seeing_arcsec:        { type: number, format: double, minimum: 0, maximum: 20 }
        twilight_definition:          { type: string, enum: [civil, nautical, astronomical] }

    NotificationsSettings:
      type: object
      description: |
        §54 notifications profile section. Mirrors WILMA's `NotificationsSettings`
        field-for-field. Token fields are stored as plain strings in v0.0.1;
        Phase 14 §40 hardening migrates to secret refs.
      required:
        [in_app_banner, os_desktop, sound_alert, pushover_token, telegram_bot_token,
         on_sequence_complete, on_sequence_paused, on_critical_diagnostic,
         on_safety_event, on_autofocus_failed, on_plate_solve_failed, on_disk_space_low]
      properties:
        in_app_banner:          { type: boolean }
        os_desktop:             { type: boolean }
        sound_alert:            { type: boolean }
        pushover_token:         { type: string }
        telegram_bot_token:     { type: string }
        on_sequence_complete:   { type: boolean }
        on_sequence_paused:     { type: boolean }
        on_critical_diagnostic: { type: boolean }
        on_safety_event:        { type: boolean }
        on_autofocus_failed:    { type: boolean }
        on_plate_solve_failed:  { type: boolean }
        on_disk_space_low:      { type: boolean }

    OperationAccepted:
      type: object
      required: [operation_id]
      properties:
        operation_id:
          type: string
          format: uuid
          description: Track operation state via WS `operation.*` events.

    Problem:
      type: object
      description: |
        RFC 7807 `application/problem+json` payload per §60.1.

        ARA-specific context lives as TOP-LEVEL extension fields (per RFC 7807 §3.2),
        not nested under `extensions`. E.g., an `equipment-not-found` problem can
        include `deviceType` and `knownDevices` at the top level.

        For 422 validation errors, `errors` is a MAP keyed by JSON-pointer path
        (matching ASP.NET Core's default + the §60.1 contract), not an array of
        triplets.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: |
            Problem-type URI. e.g., `https://openastro.net/errors/equipment-not-found`.
            URIs do not need to resolve to a live page in v0.0.1 — they're identifiers.
        title: { type: string }
        status: { type: integer }
        detail: { type: string, nullable: true }
        instance: { type: string, nullable: true }
        errors:
          type: object
          description: |
            Validation error map: JSON-pointer string → array of error messages.
            Only present on 422 responses. Example:
              "/schemaVersion": ["unrecognized version 'foo'"]
              "/instructions/3/camera_id": ["camera 'cam-abc' not in active profile"]
          additionalProperties:
            type: array
            items: { type: string }
